<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nutrition Intelligence System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0b1220, #1e293b);
  color: white;
  padding: 16px;
}

/* MAIN WRAPPER */
.container {
  max-width: 1100px;
  margin: auto;
  background: rgba(255,255,255,0.06);
  padding: 22px;
  border-radius: 18px;
  backdrop-filter: blur(12px);
}

/* TITLE */
h1 {
  text-align: center;
  margin-bottom: 20px;
  color: #38bdf8;
}

/* SECTION CARDS */
.section {
  margin-top: 18px;
  padding: 16px;
  background: rgba(255,255,255,0.05);
  border-radius: 14px;
  box-shadow: 0 0 10px rgba(56,189,248,0.1);
}

.section-title {
  font-weight: bold;
  margin-bottom: 12px;
  padding: 10px;
  border-radius: 10px;
  background: linear-gradient(90deg, #0ea5e9, #6366f1);
  box-shadow: 0 0 12px rgba(56,189,248,0.25);
}

/* RESPONSIVE GRID (FIXED) */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 14px;
}

/* INPUT BLOCK */
.field {
  display: flex;
  flex-direction: column;
}

label {
  font-size: 13px;
  margin-bottom: 6px;
  opacity: 0.9;
}

/* INPUT FIX */
input, select {
  padding: 10px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.12);
  color: white;
  outline: none;
  width: 100%;
}

/* dropdown readability fix */
select option {
  color: black;
}

/* focus */
input:focus, select:focus {
  border-color: #38bdf8;
  box-shadow: 0 0 8px #38bdf8;
}

/* BUTTON */
button {
  margin-top: 20px;
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(90deg, #22c55e, #16a34a);
  color: white;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  justify-content: center;
  align-items: center;
  padding: 16px;
}

.modal-content {
  background: white;
  color: black;
  width: 100%;
  max-width: 650px;
  max-height: 85vh;
  overflow-y: auto;
  border-radius: 14px;
  padding: 18px;
}

.close {
  float: right;
  cursor: pointer;
  font-size: 18px;
}

.new {
  margin-top: 14px;
  width: 100%;
  padding: 12px;
  background: #2563eb;
  border: none;
  color: white;
  border-radius: 10px;
}

/* MOBILE OPTIMIZATION */
@media (max-width: 600px) {
  .container {
    padding: 14px;
  }

  h1 {
    font-size: 20px;
  }
}
</style>
</head>

<body>

<div class="container">
<h1>🧠 Nutrition Intelligence System</h1>

<form id="form">

<!-- BASIC INFO -->
<div class="section">
  <div class="section-title">1. Basic Information</div>
  <div class="grid">
    <div class="field">
      <label>Name</label>
      <input name="name" required>
    </div>

    <div class="field">
      <label>Age</label>
      <input type="number" name="age">
    </div>

    <div class="field">
      <label>Gender</label>
      <select name="gender">
        <option>Male</option>
        <option>Female</option>
      </select>
    </div>

    <div class="field">
      <label>Contact</label>
      <input name="contact">
    </div>
  </div>
</div>

<!-- BODY METRICS -->
<div class="section">
  <div class="section-title">2. Body Metrics</div>
  <div class="grid">
    <div class="field">
      <label>Height (cm)</label>
      <input name="height" required>
    </div>

    <div class="field">
      <label>Weight (kg)</label>
      <input name="weight" required>
    </div>
  </div>
</div>

<!-- LIFESTYLE -->
<div class="section">
  <div class="section-title">3. Lifestyle</div>
  <div class="grid">
    <div class="field">
      <label>Activity</label>
      <select name="activity">
        <option>Sedentary</option>
        <option>Low Active</option>
        <option>Active</option>
        <option>Very Active</option>
      </select>
    </div>

    <div class="field">
      <label>Water Intake</label>
      <select name="water">
        <option value="3">&lt; 4 glasses</option>
        <option value="5">4-6 glasses</option>
        <option value="7">6-8 glasses</option>
      </select>
    </div>

    <div class="field">
      <label>Meals per Day</label>
      <select name="meals">
        <option value="1">1</option>
        <option value="2">2-3</option>
        <option value="4">More than 3</option>
      </select>
    </div>
  </div>
</div>

<!-- DIET -->
<div class="section">
  <div class="section-title">4. Diet Risk</div>
  <div class="grid">
    <div class="field">
      <label>Fast Food</label>
      <select name="fastfood">
        <option value="1">Rare</option>
        <option value="2">Occasional</option>
        <option value="3">Frequent</option>
      </select>
    </div>

    <div class="field">
      <label>Packed Food</label>
      <select name="packed">
        <option value="1">Rare</option>
        <option value="2">Occasional</option>
        <option value="3">Frequent</option>
      </select>
    </div>
  </div>
</div>

<!-- MEDICAL -->
<div class="section">
  <div class="section-title">5. Medical</div>
  <div class="grid">
    <div class="field">
      <label>Food Allergy</label>
      <select name="allergy" id="allergy">
        <option>No</option>
        <option>Yes</option>
      </select>
    </div>

    <div class="field" id="allergyBox" style="display:none;">
      <label>Specify Allergy</label>
      <input name="allergy_details">
    </div>

    <div class="field">
      <label>Substance Exposure</label>
      <select name="substance">
        <option>No</option>
        <option>Yes</option>
      </select>
    </div>
  </div>
</div>

<button type="submit">🚀 Analyze Health</button>

</form>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">✖</span>
    <div id="modalBody"></div>
    <button class="new" onclick="resetForm()">New Analysis</button>
  </div>
</div>

<script>
const form = document.getElementById("form");
const modal = document.getElementById("modal");
const modalBody = document.getElementById("modalBody");
const allergy = document.getElementById("allergy");
const allergyBox = document.getElementById("allergyBox");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const formData = Object.fromEntries(new FormData(form));

  try {
    const res = await fetch("https://n8n.srv1519870.hstgr.cloud/webhook/nutrition-form", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify(formData)
    });

    const data = await res.json();

    modalBody.innerHTML = data.html || "No response received";
    modal.style.display = "flex";

  } catch (err) {
    modalBody.innerHTML = "Server error";
    modal.style.display = "flex";
  }
});

function closeModal(){
  modal.style.display = "none";
}

function resetForm(){
  form.reset();
  modal.style.display = "none";
}

allergy.addEventListener("change", () => {
  allergyBox.style.display = allergy.value === "Yes" ? "block" : "none";
});
</script>

</body>
</html>
