<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nutrition Intelligence System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  padding: 15px;
}

/* CONTAINER */
.container {
  max-width: 950px;
  margin: auto;
  background: rgba(255,255,255,0.06);
  padding: 20px;
  border-radius: 18px;
  backdrop-filter: blur(12px);
}

/* TITLE */
h1 {
  text-align: center;
  color: #38bdf8;
  font-size: 24px;
}

/* SECTION HEADER */
.section-title {
  margin-top: 20px;
  padding: 10px;
  background: linear-gradient(90deg, #0ea5e9, #6366f1);
  border-radius: 10px;
  font-weight: bold;
  box-shadow: 0 0 12px rgba(56,189,248,0.3);
}

/* GRID FIXED */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  margin-top: 10px;
}

@media(max-width:768px){
  .grid { grid-template-columns: 1fr; }
}

/* FIELD FIX */
.field {
  display: flex;
  flex-direction: column;
}

label {
  font-size: 13px;
  margin-bottom: 6px;
  opacity: 0.9;
}

/* INPUT FIX (WHITE TEXT ISSUE SOLVED) */
input, select {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.12);
  color: white;
  outline: none;
}

/* FIX DROPDOWN TEXT */
select option {
  color: black;
}

/* FOCUS */
input:focus, select:focus {
  border-color: #38bdf8;
  box-shadow: 0 0 8px #38bdf8;
}

/* BUTTON */
button {
  margin-top: 20px;
  width: 100%;
  padding: 14px;
  background: linear-gradient(90deg, #22c55e, #16a34a);
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  transform: scale(1.02);
}

/* MODAL FIX (RESPONSIVE + SCROLL SAFE) */
.modal {
  display: none;
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.85);
  justify-content:center;
  align-items:center;
  padding: 20px;
}

.modal-content {
  background: white;
  color: black;
  width: 100%;
  max-width: 600px;
  max-height: 85vh;
  overflow-y: auto;
  padding: 20px;
  border-radius: 15px;
}

.close-btn {
  float: right;
  cursor: pointer;
  font-size: 18px;
}

.new-btn {
  margin-top: 15px;
  width: 100%;
  padding: 12px;
  border: none;
  background: #2563eb;
  color: white;
  border-radius: 10px;
}

/* ALLERGY */
.hidden {
  display: none;
}
</style>
</head>

<body>

<div class="container">
<h1>🧠 Nutrition Intelligence System</h1>

<form id="form">

<div class="section-title">1. Basic Information</div>
<div class="grid">
  <div class="field">
    <label>Name</label>
    <input name="name" required>
  </div>
  <div class="field">
    <label>Age</label>
    <input type="number" name="age">
  </div>
</div>

<div class="section-title">2. Body Metrics</div>
<div class="grid">
  <div class="field">
    <label>Height (cm)</label>
    <input name="height">
  </div>
  <div class="field">
    <label>Weight (kg)</label>
    <input name="weight">
  </div>
</div>

<div class="section-title">3. Lifestyle</div>
<div class="grid">
  <div class="field">
    <label>Activity</label>
    <select name="activity">
      <option>Sedentary</option>
      <option>Active</option>
    </select>
  </div>

  <div class="field">
    <label>Water Intake</label>
    <select name="water">
      <option value="3">&lt; 4</option>
      <option value="5">4-6</option>
      <option value="7">6-8</option>
    </select>
  </div>
</div>

<div class="section-title">4. Diet Risk</div>
<div class="grid">
  <div class="field">
    <label>Fast Food</label>
    <select name="fastfood">
      <option value="1">Low</option>
      <option value="3">High</option>
    </select>
  </div>

  <div class="field">
    <label>Packed Food</label>
    <select name="packed">
      <option value="1">Low</option>
      <option value="3">High</option>
    </select>
  </div>
</div>

<div class="section-title">5. Medical</div>
<div class="grid">
  <div class="field">
    <label>Food Allergy</label>
    <select name="allergy" id="allergy">
      <option>No</option>
      <option>Yes</option>
    </select>
  </div>

  <div class="field hidden" id="allergyBox">
    <label>Specify Allergy</label>
    <input name="allergy_details">
  </div>

  <div class="field">
    <label>Substance Exposure</label>
    <select name="substance">
      <option>No</option>
      <option>Yes</option>
    </select>
  </div>
</div>

<button type="submit">🚀 Analyze Health</button>
</form>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <span class="close-btn" onclick="closeModal()">✖</span>
    <div id="modalBody"></div>
    <button class="new-btn" onclick="resetForm()">New Analysis</button>
  </div>
</div>

<script>
const form = document.getElementById("form");
const modal = document.getElementById("modal");
const modalBody = document.getElementById("modalBody");
const allergy = document.getElementById("allergy");
const allergyBox = document.getElementById("allergyBox");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const formData = Object.fromEntries(new FormData(form));

  try {
    const res = await fetch("https://n8n.srv1519870.hstgr.cloud/webhook/nutrition-form", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify(formData)
    });

    const data = await res.json();

    modalBody.innerHTML = data.html || "No response";
    modal.style.display = "flex";

  } catch (err) {
    modalBody.innerHTML = "Server error";
    modal.style.display = "flex";
  }
});

function closeModal(){
  modal.style.display = "none";
}

function resetForm(){
  form.reset();
  modal.style.display = "none";
}

allergy.addEventListener("change", () => {
  allergyBox.classList.toggle("hidden", allergy.value !== "Yes");
});
</script>

</body>
</html>
