<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nutrition Intelligence System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  padding: 20px;
}

/* MAIN CONTAINER */
.container {
  max-width: 1000px;
  margin: auto;
  background: rgba(255,255,255,0.05);
  padding: 25px;
  border-radius: 20px;
  backdrop-filter: blur(10px);
  box-shadow: 0 0 40px rgba(0,0,0,0.5);
}

/* HEADERS */
h1 {
  text-align: center;
  margin-bottom: 25px;
  font-size: 28px;
  color: #38bdf8;
}

.section-title {
  margin-top: 25px;
  padding: 10px;
  background: linear-gradient(90deg, #0ea5e9, #6366f1);
  border-radius: 10px;
  box-shadow: 0 0 15px rgba(56,189,248,0.4);
  font-weight: bold;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
}

@media(max-width:768px){
  .grid { grid-template-columns: 1fr; }
}

/* INPUT STYLE */
label {
  font-size: 13px;
  margin-top: 10px;
  display: block;
  opacity: 0.8;
}

input, select {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border-radius: 10px;
  border: none;
  outline: none;
  background: rgba(255,255,255,0.1);
  color: white;
  box-shadow: inset 0 0 10px rgba(255,255,255,0.05);
}

input:focus, select:focus {
  box-shadow: 0 0 10px #38bdf8;
}

/* BUTTON */
button {
  margin-top: 25px;
  width: 100%;
  padding: 14px;
  background: linear-gradient(90deg, #22c55e, #16a34a);
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.02);
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  top:0; left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}

.modal-content {
  background: white;
  color: black;
  width: 90%;
  max-width: 600px;
  padding: 25px;
  border-radius: 15px;
  animation: pop 0.3s ease;
}

@keyframes pop {
  from { transform: scale(0.7); opacity:0; }
  to { transform: scale(1); opacity:1; }
}

.close-btn {
  float: right;
  cursor: pointer;
  font-size: 18px;
}

.new-btn {
  margin-top: 15px;
  background: #2563eb;
}
</style>
</head>

<body>

<div class="container">
<h1>🧠 Nutrition Intelligence System</h1>

<form id="form">

<!-- BASIC -->
<div class="section-title">1. Basic Information</div>
<div class="grid">
  <div>
    <label>Name</label>
    <input name="name" required>
  </div>
  <div>
    <label>Age</label>
    <input type="number" name="age">
  </div>
</div>

<!-- BODY -->
<div class="section-title">2. Body Metrics</div>
<div class="grid">
  <div>
    <label>Height (cm)</label>
    <input name="height">
  </div>
  <div>
    <label>Weight (kg)</label>
    <input name="weight">
  </div>
</div>

<!-- LIFESTYLE -->
<div class="section-title">3. Lifestyle</div>
<div class="grid">
  <div>
    <label>Activity</label>
    <select name="activity">
      <option>Sedentary</option>
      <option>Active</option>
    </select>
  </div>

  <div>
    <label>Water</label>
    <select name="water">
      <option value="3">Low</option>
      <option value="5">Medium</option>
      <option value="7">High</option>
    </select>
  </div>
</div>

<!-- DIET -->
<div class="section-title">4. Diet Risk</div>
<div class="grid">
  <div>
    <label>Fast Food</label>
    <select name="fastfood">
      <option value="1">Low</option>
      <option value="3">High</option>
    </select>
  </div>

  <div>
    <label>Packed Food</label>
    <select name="packed">
      <option value="1">Low</option>
      <option value="3">High</option>
    </select>
  </div>
</div>

<button type="submit">🚀 Analyze Health</button>

</form>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <span class="close-btn" onclick="closeModal()">✖</span>
    <div id="modalBody"></div>
    <button class="new-btn" onclick="resetForm()">Start New Analysis</button>
  </div>
</div>

<script>
const form = document.getElementById("form");
const modal = document.getElementById("modal");
const modalBody = document.getElementById("modalBody");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const formData = Object.fromEntries(new FormData(form));

  try {
    const res = await fetch("https://n8n.srv1519870.hstgr.cloud/webhook/nutrition-form", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(formData)
    });

    const data = await res.json();

    modalBody.innerHTML = data.html || "<p>No response</p>";
    modal.style.display = "flex";

  } catch (err) {
    modalBody.innerHTML = "<p style='color:red;'>Server error</p>";
    modal.style.display = "flex";
  }
});

function closeModal() {
  modal.style.display = "none";
}

function resetForm() {
  form.reset();
  modal.style.display = "none";
}
</script>

</body>
</html>
